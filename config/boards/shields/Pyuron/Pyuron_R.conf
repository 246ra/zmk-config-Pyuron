CONFIG_ZMK_KEYBOARD_NAME="Pyuron"

CONFIG_ZMK_POINTING=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

CONFIG_INPUT=y
CONFIG_SPI=y
CONFIG_PINCTRL=y

CONFIG_BT_CTLR_PHY_2M=n

# スリープ（ディープスリープ）機能を有効にする
CONFIG_ZMK_SLEEP=y
# アイドル状態（LEDや画面オフ）に移行するまでの時間（ミリ秒）
# デフォルトは 30000（30秒）です。必要に応じて変更します。
CONFIG_ZMK_IDLE_TIMEOUT=30000
# ディープスリープに移行するまでの時間（ミリ秒）
# 例は 900000 = 15分（900,000ms）放置でディープスリープします。
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=n

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n 
